<!DOCTYPE html>
<!--
  Wrapper Laporan Presensi DPRKPCK Jatim (GitHub Pages).
  - Wajib SSO: tanpa ?nip & ?token → diarahkan ke portal untuk login.
  - Dengan SSO → teruskan ke iframe Apps Script, yang mengunci tampilan ke NIP
    tersebut (mode SSO: pencarian disembunyikan, hanya data sendiri).
-->
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laporan Presensi — DPRKPCK Provinsi Jawa Timur</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📋</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f3f4f6; }
    #loader { position: fixed; inset: 0; background: #f3f4f6; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem; z-index: 10; transition: opacity .3s ease; }
    #loader.hidden { opacity: 0; pointer-events: none; }
    .spinner { width: 48px; height: 48px; border: 4px solid #e5e7eb; border-top-color: #4f46e5; border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-title { color: #1f2937; font-size: 16px; font-weight: 600; }
    .loader-text { color: #6b7280; font-size: 13px; }
    #gasFrame { position: fixed; inset: 0; width: 100%; height: 100%; border: none; z-index: 1; }
  </style>
</head>
<body>
  <div id="loader">
    <div class="spinner"></div>
    <div class="loader-title">Laporan Presensi DPRKPCK</div>
    <div class="loader-text">Memuat aplikasi...</div>
  </div>
  <iframe id="gasFrame" title="Laporan Presensi DPRKPCK Jatim" allow="clipboard-write"></iframe>

  <script>
    const PORTAL  = "https://dprkpckjatim.id";
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxcsv4ZLvf-daX_qKgNmEUEHhH1m2fYEU5nF4pWfdPL3Eel9JEOzASifA0yElzgoRE2/exec";

    const params = new URLSearchParams(location.search);
    const nip    = params.get("nip");
    const token  = params.get("token");

    // WAJIB SSO: dibuka langsung tanpa nip+token → minta login lewat portal,
    // yang memverifikasi sesi lalu mengembalikan ke sini dengan nip+token.
    if (!nip || !token) {
      location.replace(PORTAL + "/laporan-presensi");
    } else {
      const iframe = document.getElementById("gasFrame");
      const loader = document.getElementById("loader");
      iframe.addEventListener("load", function () {
        setTimeout(function () { loader.classList.add("hidden"); }, 600);
      });
      iframe.src = GAS_URL +
        "?nip="   + encodeURIComponent(nip) +
        "&token=" + encodeURIComponent(token);
      // Bersihkan token dari URL wrapper (refresh akan mengambil token baru via portal)
      try { history.replaceState({}, document.title, location.pathname); } catch (_) {}
    }
  </script>
</body>
</html>
